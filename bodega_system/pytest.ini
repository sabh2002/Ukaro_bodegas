[pytest]
DJANGO_SETTINGS_MODULE = bodega_system.settings
python_files = test_*.py *_test.py tests.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts =
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings

# Test discovery patterns
testpaths =
    accounts
    inventory
    sales
    customers
    suppliers
    finances
    utils

# Markers for organizing tests
markers =
    critical: Critical financial logic tests
    models: Model tests
    views: View integration tests
    api: API endpoint tests
    permissions: Permission and access control tests
    slow: Slow running tests (use --slow to run)
    integration: Integration tests spanning multiple apps

# Django settings
django_find_project = false

# Coverage exclusions
[coverage:run]
omit =
    */migrations/*
    */tests.py
    */test_*.py
    */*_test.py
    */admin.py
    */apps.py
    manage.py
    bodega_system/wsgi.py
    bodega_system/asgi.py
    */management/commands/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
